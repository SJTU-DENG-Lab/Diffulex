name: "llada2_mini"

models:
  llada2_mini:
    path: "/data/ckpts/inclusionAI/LLaDA2.0-mini"
    env: "LLADA2_MINI_MODEL"
    model_name: "llada2_mini"
    mask_token_id: 156895
  mbd_llada2_math:
    path: "/root/workspace/jyj/workspaces/MultiBD/multi_bd_train/multibd_ckpt/chosen_ckpt/llada2_mini/MBD-Math-LLaDA2-mini-16B"
    env: "MBD_LLADA2_MATH_MODEL"
    model_name: "llada2_mini"
    mask_token_id: 156895
  mbd_llada2_code:
    path: "/root/workspace/jyj/workspaces/MultiBD/multi_bd_train/multibd_ckpt/chosen_ckpt/llada2_mini/MBD-Coder-LLaDA2-mini-16B"
    env: "MBD_LLADA2_CODE_MODEL"
    model_name: "llada2_mini"
    mask_token_id: 156895

experiments:
  - name: "llada2_mini_native_math"
    variant: "SingleBD Native"
    task: "llada2_math"
    model: "llada2_mini"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    buffer_size: 1
    thresholds: {accept_threshold: 0.95}
  - name: "llada2_mini_native_code"
    variant: "SingleBD Native"
    task: "llada2_code"
    model: "llada2_mini"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    buffer_size: 1
    thresholds: {accept_threshold: 0.95}
  - name: "llada2_mini_multibd_math"
    variant: "MultiBD training-free"
    task: "llada2_math"
    model: "llada2_mini"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    buffer_size: 2
    thresholds:
      add_block_threshold: 0.10
      semi_complete_threshold: 0.90
      accept_threshold: 0.95
  - name: "llada2_mini_multibd_code"
    variant: "MultiBD training-free"
    task: "llada2_code"
    model: "llada2_mini"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    buffer_size: 2
    thresholds:
      add_block_threshold: 0.90
      semi_complete_threshold: 0.90
      accept_threshold: 0.95
  - name: "mbd_llada2_mini_math"
    variant: "MBD"
    task: "llada2_math"
    model: "mbd_llada2_math"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    buffer_size: 2
    thresholds:
      add_block_threshold: 0.10
      semi_complete_threshold: 0.90
      accept_threshold: 0.95
  - name: "mbd_llada2_mini_code"
    variant: "MBD"
    task: "llada2_code"
    model: "mbd_llada2_code"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    buffer_size: 2
    thresholds:
      add_block_threshold: 0.90
      semi_complete_threshold: 0.90
      accept_threshold: 0.95

name: "sdar_8b_chat_b32"

models:
  sdar_b32:
    path: "/root/data/ckpts/JetLM/SDAR-8B-Chat-b32"
    env: "SDAR_B32_MODEL"
    model_name: "sdar"
    mask_token_id: 151669
  mbd_sdar_b32_math:
    path: "/root/workspace/jyj/workspaces/MultiBD/multi_bd_train/multibd_ckpt/chosen_ckpt/sdar8Bb32/MBD-Math-SDAR-8B-Chat-b32"
    env: "MBD_SDAR_B32_MATH_MODEL"
    model_name: "sdar"
    mask_token_id: 151669
  mbd_sdar_b32_code:
    path: "/root/workspace/jyj/workspaces/MultiBD/multi_bd_train/multibd_ckpt/sdar_8Bb32_mbd_v2_sft_sdar_code_60k_br0_bufsz2/checkpoints/global_step_18750/hf_ckpt"
    env: "MBD_SDAR_B32_CODE_MODEL"
    model_name: "sdar"
    mask_token_id: 151669

experiments:
  - name: "sdar_8b_chat_b32_native_math"
    variant: "SingleBD Native"
    task: "sdar_math"
    model: "sdar_b32"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    page_size: 32
    buffer_size: 1
    thresholds: {accept_threshold: 0.95}
  - name: "sdar_8b_chat_b32_native_code"
    variant: "SingleBD Native"
    task: "sdar_code"
    model: "sdar_b32"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    page_size: 32
    buffer_size: 1
    thresholds: {accept_threshold: 0.95}
  - name: "sdar_8b_chat_b32_multibd_math"
    variant: "MultiBD training-free"
    task: "sdar_math"
    model: "sdar_b32"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    page_size: 32
    buffer_size: 4
    thresholds:
      add_block_threshold: 0.10
      semi_complete_threshold: 0.90
      accept_threshold: 0.95
  - name: "sdar_8b_chat_b32_multibd_code"
    variant: "MultiBD training-free"
    task: "sdar_code"
    model: "sdar_b32"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    page_size: 32
    buffer_size: 4
    thresholds:
      add_block_threshold: 0.90
      semi_complete_threshold: 0.90
      accept_threshold: 0.95
  - name: "mbd_sdar_8b_chat_b32_math"
    variant: "MBD"
    task: "sdar_math"
    model: "mbd_sdar_b32_math"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    page_size: 32
    buffer_size: 4
    thresholds:
      add_block_threshold: 0.10
      semi_complete_threshold: 0.90
      accept_threshold: 0.95
  - name: "mbd_sdar_8b_chat_b32_code"
    variant: "MBD"
    task: "sdar_code"
    model: "mbd_sdar_b32_code"
    decoding_strategy: "multi_bd"
    sampling_mode: "naive"
    block_size: 32
    page_size: 32
    buffer_size: 4
    thresholds:
      add_block_threshold: 0.90
      semi_complete_threshold: 0.90
      accept_threshold: 0.95

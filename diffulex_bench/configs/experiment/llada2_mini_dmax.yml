name: "llada2_mini_dmax"

models:
  dmax_math:
    path: "/root/data/ckpts/Zigeng/DMax-Math-16B"
    env: "DMAX_MATH_MODEL"
    model_name: "llada2_mini"
    mask_token_id: 156895
  dmax_code:
    path: "/root/data/ckpts/Zigeng/DMax-Coder-16B"
    env: "DMAX_CODE_MODEL"
    model_name: "llada2_mini"
    mask_token_id: 156895
  mbd_dmax_math:
    path: "/root/workspace/jyj/workspaces/MultiBD/multi_bd_train/multibd_ckpt/chosen_ckpt/dmax/MBD-Math-LLaDA2-mini-DMax-16B"
    env: "MBD_DMAX_MATH_MODEL"
    model_name: "llada2_mini"
    mask_token_id: 156895
  mbd_dmax_code:
    path: "/root/workspace/jyj/workspaces/MultiBD/multi_bd_train/multibd_ckpt/chosen_ckpt/dmax/MBD-Coder-LLaDA2-mini-DMax-16B"
    env: "MBD_DMAX_CODE_MODEL"
    model_name: "llada2_mini"
    mask_token_id: 156895

experiments:
  - name: "llada2_mini_dmax_native_math"
    variant: "SingleBD Native"
    task: "llada2_math"
    model: "dmax_math"
    decoding_strategy: "dmax"
    sampling_mode: "edit"
    block_size: 32
    buffer_size: 1
    thresholds: {accept_threshold: 0.50}
  - name: "llada2_mini_dmax_native_code"
    variant: "SingleBD Native"
    task: "llada2_code"
    model: "dmax_code"
    decoding_strategy: "dmax"
    sampling_mode: "edit"
    block_size: 32
    buffer_size: 1
    thresholds: {accept_threshold: 0.65}
  - name: "llada2_mini_dmax_multibd_math"
    variant: "MultiBD training-free"
    task: "llada2_math"
    model: "dmax_math"
    decoding_strategy: "multi_bd"
    sampling_mode: "edit"
    block_size: 32
    buffer_size: 2
    thresholds:
      add_block_threshold: 0.10
      semi_complete_threshold: 0.90
      accept_threshold: 0.50
      token_stability_threshold: 0.50
  - name: "llada2_mini_dmax_multibd_code"
    variant: "MultiBD training-free"
    task: "llada2_code"
    model: "dmax_code"
    decoding_strategy: "multi_bd"
    sampling_mode: "edit"
    block_size: 32
    buffer_size: 2
    thresholds:
      add_block_threshold: 0.90
      semi_complete_threshold: 0.90
      accept_threshold: 0.65
      token_stability_threshold: 0.50
  - name: "mbd_llada2_mini_dmax_math"
    variant: "MBD"
    task: "llada2_math"
    model: "mbd_dmax_math"
    decoding_strategy: "multi_bd"
    sampling_mode: "edit"
    block_size: 32
    buffer_size: 2
    thresholds:
      add_block_threshold: 0.10
      semi_complete_threshold: 0.90
      accept_threshold: 0.50
      token_stability_threshold: 0.50
  - name: "mbd_llada2_mini_dmax_code"
    variant: "MBD"
    task: "llada2_code"
    model: "mbd_dmax_code"
    decoding_strategy: "multi_bd"
    sampling_mode: "edit"
    block_size: 32
    buffer_size: 2
    thresholds:
      add_block_threshold: 0.90
      semi_complete_threshold: 0.90
      accept_threshold: 0.65
      token_stability_threshold: 0.50
